name: Submission Readiness

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run submission readiness checks
        env:
          CASPER_PREFLIGHT_FILE: submission/casper-testnet-preflight.json
        run: npm run check:ci
